<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Myla's Emoji Games</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(135deg, #ffe0f0, #fff0f5, #fce4ec);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100dvh;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }

    .screen { display: none; height: 100dvh; position: relative; }
    .screen.active { display: flex; flex-direction: column; align-items: center; }

    @keyframes sparkle-float {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-100vh); opacity: 0; }
    }

    .sparkles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .sparkle { position: absolute; animation: sparkle-float 3s ease-in infinite; opacity: 0; }

    /* Home screen */
    .home-emojis { font-size: 48px; margin-bottom: 8px; letter-spacing: 12px; }
    .rainbow-title {
      font-size: 28px; font-weight: 800;
      background: linear-gradient(90deg, #ff6b9d, #ffa751, #ffe259, #7ed56f, #55c1ff, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 32px;
    }
    .home-buttons { display: flex; flex-direction: column; gap: 16px; }
    .game-btn {
      display: flex; align-items: center; gap: 14px; background: white; border: none;
      border-radius: 20px; padding: 18px 24px; font-size: 18px; font-weight: 600; color: #333;
      box-shadow: 0 4px 16px rgba(233, 30, 99, 0.15); cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .game-btn:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(233, 30, 99, 0.2); }
    .btn-emoji { font-size: 36px; }
    .btn-text { text-align: left; }
    .settings-btn {
      position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.5);
      border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 18px;
      cursor: pointer; z-index: 2; -webkit-tap-highlight-color: transparent;
    }
    .back-btn {
      position: absolute; top: 16px; left: 16px; background: rgba(255,255,255,0.5);
      border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 18px;
      cursor: pointer; z-index: 2; -webkit-tap-highlight-color: transparent;
    }

    /* Match game styles */
    #match-area {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 0;
      flex: 1;
      width: 100%;
      max-width: 500px;
      padding: 8px 16px;
      position: relative;
    }
    .match-column { display: flex; flex-direction: column; gap: 12px; z-index: 1; }
    .match-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .emoji-card {
      width: 72px; height: 72px; background: white; border-radius: 18px;
      display: flex; align-items: center; justify-content: center; font-size: 36px;
      box-shadow: 0 3px 12px rgba(233,30,99,0.12); cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s; -webkit-tap-highlight-color: transparent; position: relative;
    }
    .emoji-card.selected { transform: scale(1.1); box-shadow: 0 0 0 3px #ff6b9d, 0 4px 16px rgba(233,30,99,0.3); }
    .emoji-card.matched { opacity: 0.6; pointer-events: none; }
    .emoji-card.wrong { animation: matchShake 0.4s ease; }
    @keyframes matchShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); } 40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); } 80% { transform: translateX(4px); }
    }
    .emoji-card.sparkle-pop { animation: sparkle-pop 0.5s ease; }
    @keyframes sparkle-pop {
      0% { transform: scale(1); } 50% { transform: scale(1.25); } 100% { transform: scale(1); opacity: 0.6; }
    }
  </style>
</head>
<body>
  <div class="sparkles" id="sparkles"></div>

  <div id="home-screen" class="screen active">
    <div style="padding: 40px 20px; text-align: center; z-index: 1; width: 100%; max-width: 400px;">
      <div class="home-emojis">🦄 🌈 ⭐</div>
      <h1 class="rainbow-title">Myla's Emoji Games</h1>
      <div class="home-buttons">
        <button class="game-btn" onclick="showScreen('match-screen'); startMatchGame()">
          <span class="btn-emoji">🔗</span>
          <span class="btn-text">Match the Emojis!</span>
        </button>
        <button class="game-btn" onclick="showScreen('sort-screen'); startSortGame()">
          <span class="btn-emoji">📦</span>
          <span class="btn-text">Sort the Emojis!</span>
        </button>
      </div>
    </div>
    <button class="settings-btn" onclick="openSettings()">⚙️</button>
  </div>

  <div id="match-screen" class="screen">
    <button class="back-btn" onclick="goHome()">&#8592;</button>
    <h2 class="game-title rainbow-title" style="margin-top: 20px; font-size: 22px;">Match the Emojis!</h2>
    <div id="match-area">
      <div id="match-left" class="match-column"></div>
      <svg id="match-lines" class="match-svg"></svg>
      <div id="match-right" class="match-column"></div>
    </div>
  </div>

  <div id="sort-screen" class="screen">
    <button class="back-btn" onclick="goHome()">←</button>
  </div>

  <div id="settings-overlay" class="overlay"></div>
  <div id="celebration-overlay" class="overlay"></div>

  <script>
    // === Task 3: Emoji data and utilities ===

    const PAIRS = [
      ['🐶','🦴'], ['☀️','🌻'], ['🌧️','☂️'], ['🐰','🥕'],
      ['👶','🍼'], ['🎵','🎸'], ['🐟','🌊'], ['🌙','⭐'],
      ['🐻','🍯'], ['🎨','🖌️'], ['🏠','🔑'], ['🌺','🦋'],
      ['🍕','🧀'], ['✈️','☁️'], ['🐱','🧶'], ['🚀','🪐'],
      ['🐸','🪷'], ['🦁','👑'], ['❄️','⛄'], ['🌈','🔆'],
      ['🐵','🍌'], ['🐦','🪺'], ['🍪','🥛'], ['🏀','🏆'],
    ];

    const CATEGORIES = {
      Animals:  { icon: '🐾', emojis: ['🐶','🐱','🐰','🐻','🦁','🐸','🐵','🦋','🐟','🐦','🐢','🐷','🐮','🦊'] },
      Fruits:   { icon: '🍎', emojis: ['🍎','🍌','🍓','🍊','🍇','🍉','🍑','🍒','🫐','🥝'] },
      Food:     { icon: '🍕', emojis: ['🍕','🍔','🧁','🍩','🍪','🌮','🍦','🍿','🥪','🧀'] },
      Vehicles: { icon: '🚗', emojis: ['🚗','🚌','🚒','✈️','🚀','🚂','🚁','⛵','🛵','🚲'] },
      Weather:  { icon: '☀️', emojis: ['☀️','🌧️','⛈️','🌈','❄️','🌙','⭐','☁️','🌪️'] },
      Sports:   { icon: '⚽', emojis: ['⚽','🏀','🎾','⛷️','🏊','🚴','🏆','🥇'] },
      Hearts:   { icon: '❤️', emojis: ['❤️','🧡','💛','💚','💙','💜','🩷','🖤','🤍'] },
      Nature:   { icon: '🌸', emojis: ['🌸','🌻','🌺','🌴','🌵','🍀','🌊','🪻','🌹'] },
      Music:    { icon: '🎵', emojis: ['🎵','🎸','🥁','🎹','🎺','🎷','🪘'] },
    };

    const DIFFICULTY = {
      easy:   { matchPairs: 4, sortEmojis: 6, sortCategories: 2 },
      medium: { matchPairs: 6, sortEmojis: 9, sortCategories: 3 },
      hard:   { matchPairs: 8, sortEmojis: 12, sortCategories: 4 },
    };

    let currentDifficulty = localStorage.getItem('emoji-difficulty') || 'easy';
    function getDifficulty() { return DIFFICULTY[currentDifficulty]; }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pickRandom(arr, n) { return shuffle(arr).slice(0, n); }

    function selectMatchPairs(count) {
      const shuffled = shuffle(PAIRS);
      const selected = [];
      const usedEmojis = new Set();
      for (const pair of shuffled) {
        if (selected.length >= count) break;
        if (!usedEmojis.has(pair[0]) && !usedEmojis.has(pair[1])) {
          selected.push(pair);
          usedEmojis.add(pair[0]);
          usedEmojis.add(pair[1]);
        }
      }
      return selected;
    }

    function selectSortCategories(numCategories, emojisPerCategory) {
      const names = shuffle(Object.keys(CATEGORIES));
      const chosen = names.slice(0, numCategories);
      const perCat = Math.floor(emojisPerCategory / numCategories);
      return chosen.map(name => ({
        name, icon: CATEGORIES[name].icon,
        emojis: pickRandom(CATEGORIES[name].emojis, perCat),
      }));
    }

    let currentGame = null;

    function celebrate() { alert('You did it!'); goHome(); }

    // === Task 2: Navigation ===

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function goHome() { showScreen('home-screen'); }

    // === Task 4: Match game ===

    let matchState = { pairs: [], selected: null, matched: 0, total: 0, dragging: false };

    function startMatchGame() {
      currentGame = 'match';
      const diff = getDifficulty();
      const pairs = selectMatchPairs(diff.matchPairs);
      const leftEmojis = pairs.map(p => p[0]);
      const rightEmojis = shuffle(pairs.map(p => p[1]));
      matchState = { pairs, selected: null, matched: 0, total: pairs.length, dragging: false };

      const leftCol = document.getElementById('match-left');
      const rightCol = document.getElementById('match-right');
      const svg = document.getElementById('match-lines');
      leftCol.innerHTML = '';
      rightCol.innerHTML = '';
      svg.innerHTML = '';

      leftEmojis.forEach((emoji, i) => {
        const card = document.createElement('div');
        card.className = 'emoji-card';
        card.textContent = emoji;
        card.dataset.emoji = emoji;
        card.dataset.side = 'left';
        card.dataset.index = i;
        leftCol.appendChild(card);
      });

      rightEmojis.forEach((emoji, i) => {
        const card = document.createElement('div');
        card.className = 'emoji-card';
        card.textContent = emoji;
        card.dataset.emoji = emoji;
        card.dataset.side = 'right';
        card.dataset.index = i;
        rightCol.appendChild(card);
      });

      setupMatchInteraction();
    }

    function setupMatchInteraction() {
      // Clone the area to remove any old event listeners from previous games
      const oldArea = document.getElementById('match-area');
      const newArea = oldArea.cloneNode(true);
      oldArea.parentNode.replaceChild(newArea, oldArea);

      const area = document.getElementById('match-area');
      const svg = document.getElementById('match-lines');
      let dragLine = null;
      let dragFrom = null;

      function getCardCenter(card) {
        const rect = card.getBoundingClientRect();
        const areaRect = area.getBoundingClientRect();
        return { x: rect.left + rect.width / 2 - areaRect.left, y: rect.top + rect.height / 2 - areaRect.top };
      }

      function findPair(emoji1, emoji2) {
        return matchState.pairs.some(p =>
          (p[0] === emoji1 && p[1] === emoji2) || (p[0] === emoji2 && p[1] === emoji1));
      }

      function drawLine(x1, y1, x2, y2, permanent) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y1);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        line.setAttribute('stroke', permanent ? 'url(#rainbow)' : 'rgba(255,107,157,0.5)');
        line.setAttribute('stroke-width', permanent ? '3' : '2');
        line.setAttribute('stroke-linecap', 'round');
        svg.appendChild(line);
        return line;
      }

      // Rainbow gradient for SVG lines
      if (!svg.querySelector('#rainbow')) {
        const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        defs.innerHTML = '<linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">' +
          '<stop offset="0%" stop-color="#ff6b9d"/><stop offset="25%" stop-color="#ffa751"/>' +
          '<stop offset="50%" stop-color="#7ed56f"/><stop offset="75%" stop-color="#55c1ff"/>' +
          '<stop offset="100%" stop-color="#c084fc"/></linearGradient>';
        svg.appendChild(defs);
      }

      function tryMatch(card1, card2) {
        if (card1.dataset.side === card2.dataset.side) return false;
        const isMatch = findPair(card1.dataset.emoji, card2.dataset.emoji);
        if (isMatch) {
          card1.classList.add('matched', 'sparkle-pop');
          card2.classList.add('matched', 'sparkle-pop');
          const c1 = getCardCenter(card1), c2 = getCardCenter(card2);
          drawLine(c1.x, c1.y, c2.x, c2.y, true);
          matchState.matched++;
          if (matchState.matched === matchState.total) setTimeout(() => celebrate(), 400);
        } else {
          card1.classList.add('wrong');
          card2.classList.add('wrong');
          setTimeout(() => { card1.classList.remove('wrong', 'selected'); card2.classList.remove('wrong', 'selected'); }, 400);
        }
        return isMatch;
      }

      // Unified pointer handling
      area.addEventListener('pointerdown', (e) => {
        const card = e.target.closest('.emoji-card');
        if (!card || card.classList.contains('matched')) return;
        dragFrom = card;
        card.classList.add('selected');
        card.setPointerCapture(e.pointerId);
        const c = getCardCenter(card);
        const areaRect = area.getBoundingClientRect();
        dragLine = drawLine(c.x, c.y, e.clientX - areaRect.left, e.clientY - areaRect.top, false);
        matchState.dragging = true;
      });

      area.addEventListener('pointermove', (e) => {
        if (!dragLine || !matchState.dragging) return;
        const areaRect = area.getBoundingClientRect();
        dragLine.setAttribute('x2', e.clientX - areaRect.left);
        dragLine.setAttribute('y2', e.clientY - areaRect.top);
      });

      area.addEventListener('pointerup', (e) => {
        if (!dragFrom) return;
        if (dragLine) { dragLine.remove(); dragLine = null; }
        const elUnder = document.elementFromPoint(e.clientX, e.clientY);
        const targetCard = elUnder ? elUnder.closest('.emoji-card') : null;
        if (targetCard && targetCard !== dragFrom && !targetCard.classList.contains('matched')) {
          const matched = tryMatch(dragFrom, targetCard);
          if (!matched) targetCard.classList.remove('selected');
        }
        dragFrom.classList.remove('selected');
        dragFrom = null;
        matchState.dragging = false;
      });

      area.addEventListener('pointercancel', () => {
        if (dragLine) { dragLine.remove(); dragLine = null; }
        if (dragFrom) { dragFrom.classList.remove('selected'); dragFrom = null; }
        matchState.dragging = false;
      });
    }

    // Placeholder game functions
    function startSortGame() {}
    function openSettings() {}

    // === Task 1: Sparkle spawner ===

    function spawnSparkles() {
      const container = document.getElementById('sparkles');
      const symbols = ['✨', '⭐', '💖', '🌟'];
      setInterval(() => {
        const el = document.createElement('span');
        el.className = 'sparkle';
        el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.bottom = '-20px';
        el.style.animationDuration = (2 + Math.random() * 3) + 's';
        el.style.fontSize = (10 + Math.random() * 14) + 'px';
        container.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }, 400);
    }
    spawnSparkles();
  </script>
</body>
</html>
